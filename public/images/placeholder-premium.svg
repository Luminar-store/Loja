<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#161616" />
  
  <!-- Estrelas ou brilhos de fundo -->
  <g opacity="0.15">
    <circle cx="150" cy="180" r="1" fill="#f2ca50" />
    <circle cx="650" cy="220" r="1.5" fill="#f2ca50" />
    <circle cx="200" cy="600" r="1" fill="#f2ca50" />
    <circle cx="600" cy="580" r="2" fill="#f2ca50" />
  </g>

  <!-- Elemento Central: Joia de Diamante Estilizada -->
  <g transform="translate(400, 360)">
    <!-- Linhas de conexão douradas finas -->
    <polygon points="0,-120 90,-40 0,120 -90,-40" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.3" />
    <polygon points="0,-120 40,-40 0,120 -40,-40" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.2" />
    
    <!-- Diamante Central -->
    <path d="M-60,-40 L-20,-90 L20,-90 L60,-40 L0,50 Z" fill="none" stroke="#d4af37" stroke-width="2.5" stroke-linejoin="round" />
    <path d="M-60,-40 L60,-40" fill="none" stroke="#d4af37" stroke-width="1.5" />
    <path d="M-20,-90 L-15,-40 L0,50 L15,-40 L20,-90" fill="none" stroke="#d4af37" stroke-width="1.5" />
    <path d="M-15,-40 L15,-40" fill="none" stroke="#d4af37" stroke-width="1" />
  </g>

  <!-- Texto de Luxo -->
  <text x="50%" y="540" text-anchor="middle" fill="#e5e2e1" font-family="'Cinzel', 'Didot', 'Playfair Display', serif" font-size="20" font-weight="300" letter-spacing="12" opacity="0.9">L U M I N A R</text>
  <text x="50%" y="575" text-anchor="middle" fill="#d4af37" font-family="'Inter', 'Montserrat', sans-serif" font-size="10" font-weight="700" letter-spacing="6" opacity="0.6">ALTA JOALHERIA</text>
  
  <text x="50%" y="640" text-anchor="middle" fill="#ffffff" font-family="'Inter', sans-serif" font-size="11" font-weight="300" letter-spacing="2" opacity="0.25">IMAGEM EM BREVE</text>
</svg>
